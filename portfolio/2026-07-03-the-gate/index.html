<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Gate</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #0b0d11; }
  body { display: grid; place-items: center; font-family: Georgia, serif; }
  figure { margin: 0; text-align: center; }
  canvas { display: block; box-shadow: 0 30px 80px rgba(0,0,0,.6); }
  figcaption { color: #8b8b96; font-size: 14px; letter-spacing: .06em; margin-top: 20px; font-style: italic; }
  figcaption b { color: #cfd2dc; font-style: normal; font-weight: normal; }
</style>
</head>
<body>
<figure>
<canvas id="c" width="1080" height="600"></canvas>
<figcaption><b>The Gate</b> — dice arrive in parallel; the gate admits one at a time;
bad rolls loop back and roll again. The wall on the right is made only of passes.</figcaption>
</figure>
<script>
'use strict';
// The Gate — the day's scheduler as motion, 2026-07-03.
//
// Particles (generations) stream in on parallel lanes. A single-slot gate
// (the semaphore) admits one at a time. Each carries a seeded die: mulberry32
// — the same PRNG our data generator uses — so every run of this piece is
// identical. A bad roll (the lottery's ~1-in-3) is turned back at the gate,
// loops around, and rolls again: the retry. Only passes cross, and they stack
// into the rising wall on the right — a scorecard built exclusively of truths.
// Determinism about randomness: the dice are random, the film is not.

const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
const GATE_X = W * 0.56, LANES = 6;
const laneY = i => 90 + i * ((H - 180) / (LANES - 1));

function mulberry32(a) { return function() {
  a |= 0; a = a + 0x6D2B79F5 | 0;
  let t = Math.imul(a ^ a >>> 15, 1 | a);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
const rnd = mulberry32(42);

// Pre-roll the entire film deterministically: 60 arrivals, each with lane,
// start time, and its sequence of die rolls (re-rolling until it passes).
const arrivals = [];
for (let k = 0; k < 60; k++) {
  const rolls = [];
  while (true) { const r = rnd(); rolls.push(r); if (r >= 0.34) break; } // pass ≥ .34
  arrivals.push({ lane: k % LANES, t0: 40 + k * 55 + Math.floor(rnd() * 25), rolls });
}

// The gate grants one crossing slot at a time; queue is FIFO by arrival at gate.
const SPEED = 2.1, LOOP_T = 150; // frames to loop back on a failed roll
let wall = [];                    // stacked passes: {col,row}
let frame = 0;

function particleState(a, f) {
  // returns {x,y,phase,rollIdx} for arrival a at frame f (pure function).
  let t = f - a.t0;
  if (t < 0) return null;
  const gateArrive = (GATE_X - 40) / SPEED;
  let rollIdx = 0;
  while (rollIdx < a.rolls.length - 1) {
    // each failed roll costs: reach gate + loop back
    const cost = gateArrive + LOOP_T;
    if (t < cost) break;
    t -= cost; rollIdx++;
  }
  if (rollIdx === a.rolls.length - 1 && t > gateArrive) {
    // passed the gate: cross and stack
    const cross = t - gateArrive;
    const wx = GATE_X + 60 + cross * SPEED * 1.4;
    const slot = wallSlot(a);
    const tx = W - 90 - slot.col * 16, ty = H - 60 - slot.row * 16;
    if (wx >= tx) return { x: tx, y: ty, phase: 'wall', rollIdx };
    const yy = laneY(a.lane) + (ty - laneY(a.lane)) * Math.min(1, cross / 140);
    return { x: Math.min(wx, tx), y: yy, phase: 'crossing', rollIdx };
  }
  if (t < gateArrive) {
    // inbound (fresh or re-rolled)
    return { x: 40 + t * SPEED, y: laneY(a.lane), phase: rollIdx ? 'retry-in' : 'inbound', rollIdx };
  }
  // looping back after a failed roll
  const lt = (t - gateArrive) / LOOP_T;
  const cx = GATE_X - 60, cy = laneY(a.lane) - 46;
  const ang = Math.PI * (0.0 + lt * 2);
  return { x: cx + Math.cos(ang) * 52, y: cy + Math.sin(ang) * 40, phase: 'loop', rollIdx };
}
const wallIndex = new Map(); let wallCount = 0;
function wallSlot(a) {
  const key = a.t0 + ':' + a.lane;
  if (!wallIndex.has(key)) { wallIndex.set(key, { col: Math.floor(wallCount / 24), row: wallCount % 24 }); wallCount++; }
  return wallIndex.get(key);
}

function draw() {
  ctx.fillStyle = '#0f1218'; ctx.fillRect(0, 0, W, H);
  // lanes
  ctx.strokeStyle = 'rgba(120,127,142,.14)';
  for (let i = 0; i < LANES; i++) { ctx.beginPath(); ctx.moveTo(30, laneY(i)); ctx.lineTo(GATE_X - 14, laneY(i)); ctx.stroke(); }
  // the gate — one slot wide
  ctx.fillStyle = '#e8d9a0';
  ctx.fillRect(GATE_X, 60, 3, H - 120);
  ctx.clearRect ? null : null;
  ctx.fillStyle = '#0f1218'; ctx.fillRect(GATE_X - 2, H/2 - 14, 8, 28); // the single slot
  ctx.strokeStyle = '#e8d9a0'; ctx.strokeRect(GATE_X - 2, H/2 - 14, 8, 28);
  wallIndex.clear(); wallCount = 0;
  for (const a of arrivals) {
    const s = particleState(a, frame);
    if (!s) continue;
    const good = a.rolls[Math.min(s.rollIdx, a.rolls.length - 1)] >= 0.34;
    const passedFinal = s.rollIdx === a.rolls.length - 1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.phase === 'wall' ? 6 : 4.5, 0, Math.PI * 2);
    ctx.fillStyle = s.phase === 'wall' ? '#ffd766'
      : s.phase === 'loop' ? '#c07a8a'
      : s.phase === 'retry-in' ? '#c9a86b'
      : passedFinal ? '#9fd0a8' : '#8b93a5';
    ctx.globalAlpha = s.phase === 'wall' ? 1 : .9;
    ctx.fill(); ctx.globalAlpha = 1;
  }
  ctx.fillStyle = '#787f8e'; ctx.font = 'italic 12px Georgia';
  ctx.fillText('arrivals (parallel)', 40, 44);
  ctx.fillText('one at a time', GATE_X - 34, 44);
  ctx.fillText('the wall of passes', W - 178, 44);
  frame++;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
