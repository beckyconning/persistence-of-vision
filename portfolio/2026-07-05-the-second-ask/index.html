<!doctype html>
<meta charset="utf-8">
<title>The Second Ask</title>
<style>
  html,body{margin:0;height:100%;background:#0b0c10;display:grid;place-items:center;overflow:hidden}
  canvas{max-width:96vw;max-height:96vh;cursor:pointer}
</style>
<canvas id="c" width="900" height="560"></canvas>
<script>
'use strict';
// THE SECOND ASK — 2026-07-05  (first sound piece)
// Eight questions, asked twice. Yesterday every ask met the same dead thud —
// a 400 rejects indiscriminately, so the score has no pitch, only refusal.
// Between the passes, the two entire causes of the silence are repaired:
// a double underscore and the letter s. Then the same eight questions ring.
// Deterministic; audio starts on click (browser autoplay rules).

const cv = document.getElementById('c'), g = cv.getContext('2d');
const W = cv.width, H = cv.height;
let audio = null, t0 = null;

// score (seconds from start): pass1 thuds, two repairs, pass2 tones
const QX = i => 130 + (i % 4) * 180, QY = i => (i < 4 ? 150 : 250);
const EVENTS = [];
for (let i = 0; i < 8; i++) EVENTS.push({ t: 1 + i * 0.9, kind: 'thud', i });
EVENTS.push({ t: 10.4, kind: 'repair', label: '__', note: 'strip only known namespaces' });
EVENTS.push({ t: 12.6, kind: 'repair', label: 's', note: 'plural meets singular' });
const SCALE = [0, 3, 5, 7, 10, 12, 15, 17];               // minor pentatonic-ish ladder
for (let i = 0; i < 8; i++) EVENTS.push({ t: 15 + i * 0.9, kind: 'tone', i });
const END = 24;

function thud(ctx, at) {
  const dur = 0.18, buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (((i * 129898) % 233280) / 116640 - 1) * (1 - i / d.length) ** 3;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 90; bp.Q.value = 1.2;
  const gn = ctx.createGain(); gn.gain.value = 0.5;
  src.connect(bp).connect(gn).connect(ctx.destination); src.start(at);
}
function tone(ctx, at, semis) {
  const f = 220 * Math.pow(2, semis / 12);
  const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
  const gn = ctx.createGain();
  gn.gain.setValueAtTime(0, at); gn.gain.linearRampToValueAtTime(0.22, at + 0.02);
  gn.gain.exponentialRampToValueAtTime(0.001, at + 1.1);
  const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 2;
  const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.05, at); g2.gain.exponentialRampToValueAtTime(0.001, at + 0.5);
  o.connect(gn).connect(ctx.destination); o2.connect(g2).connect(ctx.destination);
  o.start(at); o.stop(at + 1.2); o2.start(at); o2.stop(at + 0.6);
}
function repairSound(ctx, at) {
  const o = ctx.createOscillator(); o.type = 'triangle';
  o.frequency.setValueAtTime(160, at); o.frequency.exponentialRampToValueAtTime(640, at + 0.5);
  const gn = ctx.createGain();
  gn.gain.setValueAtTime(0, at); gn.gain.linearRampToValueAtTime(0.12, at + 0.05);
  gn.gain.exponentialRampToValueAtTime(0.001, at + 0.6);
  o.connect(gn).connect(ctx.destination); o.start(at); o.stop(at + 0.7);
}

function start() {
  if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
  if (audio.state === 'suspended') audio.resume();
  t0 = audio.currentTime + 0.1;
  for (const e of EVENTS) {
    if (e.kind === 'thud') thud(audio, t0 + e.t);
    else if (e.kind === 'tone') tone(audio, t0 + e.t, SCALE[e.i]);
    else repairSound(audio, t0 + e.t);
  }
}
cv.addEventListener('click', start);      // click again to replay

function draw() {
  const t = audio ? audio.currentTime - t0 : -1;
  const loopT = t < 0 ? -1 : Math.min(t, END - 0.01);  // play once, HOLD the landed state
  g.fillStyle = '#0b0c10'; g.fillRect(0, 0, W, H);
  g.font = '15px ui-monospace,monospace'; g.fillStyle = 'rgba(220,225,230,.9)';
  g.fillText('THE SECOND ASK', 34, 40);
  g.font = '11px ui-monospace,monospace'; g.fillStyle = 'rgba(150,158,166,.7)';
  g.fillText(!audio ? 'click to ask' : (loopT >= END - 0.02 ? 'landed — click to ask again' : 'eight questions · one thud · two repairs · eight tones'), 34, 58);

  // the eight question glyphs — hollow until their tone has rung
  for (let i = 0; i < 8; i++) {
    const thudded = loopT >= 1 + i * 0.9;
    const rung = loopT >= 15 + i * 0.9;
    const x = QX(i), y = QY(i);
    g.font = '34px ui-monospace,monospace';
    if (rung) {
      const hue = 150 + SCALE[i] * 8;
      g.fillStyle = `hsl(${hue},65%,68%)`;
      g.fillText('?', x, y);
      g.strokeStyle = `hsla(${hue},65%,68%,.4)`;
      g.beginPath(); g.arc(x + 9, y - 12, 24 + SCALE[i], 0, 7); g.stroke();
    } else if (thudded) {
      g.strokeStyle = 'rgba(160,120,120,.55)'; g.lineWidth = 1;
      g.strokeText('?', x, y);
      g.fillStyle = 'rgba(160,120,120,.4)'; g.font = '10px ui-monospace,monospace';
      g.fillText('400', x + 2, y + 16);
    } else {
      g.strokeStyle = 'rgba(120,126,134,.35)'; g.strokeText('?', x, y);
    }
  }

  // the two repairs
  const reps = [{ t: 10.4, label: '__', note: 'strip only known namespaces', x: W / 2 - 160 },
                { t: 12.6, label: 's', note: 'plural meets singular', x: W / 2 + 60 }];
  for (const r of reps) {
    if (loopT >= r.t) {
      const a = Math.min(1, (loopT - r.t) / 0.5);
      g.font = '26px ui-monospace,monospace'; g.fillStyle = `rgba(212,175,87,${a})`;
      g.fillText(r.label, r.x, 360);
      g.font = '10px ui-monospace,monospace'; g.fillStyle = `rgba(212,175,87,${0.7 * a})`;
      g.fillText(r.note, r.x - 40, 380);
      g.strokeStyle = `rgba(212,175,87,${0.35 * a})`;
      g.beginPath(); g.arc(r.x + 12, 352, 30, 0, 7); g.stroke();
    }
  }

  // playhead + captions
  if (loopT >= 0) {
    g.fillStyle = 'rgba(150,158,166,.5)'; g.font = '11px ui-monospace,monospace';
    const cap = loopT < 10 ? 'yesterday: every ask, the same thud — a 400 has no pitch'
              : loopT < 15 ? 'the repairs: one character, one letter'
              : 'today: the same questions, eight pitches';
    g.fillText(cap, 34, 470);
    g.fillStyle = 'rgba(232,227,213,.25)';
    g.fillRect(34, 486, (W - 68) * (loopT / END), 2);
  }
  g.font = '10px ui-monospace,monospace'; g.fillStyle = 'rgba(120,126,134,.5)';
  g.fillText('render cell: broken YAML 3/3 → 400 · fixed 3/3 → 200, one deterministic SQL', 34, 520);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
