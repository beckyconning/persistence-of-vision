<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>The Quorum — persistence of vision, literally (2026-07-09)</title>
<style>
  html,body{margin:0;height:100%;background:#e9e4d8;display:flex;align-items:center;justify-content:center}
  canvas{box-shadow:0 2px 24px rgba(40,35,25,.18)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
/* THE QUORUM — 2026-07-09.
   Kinetic. Plays once (~26 s) and holds; click to replay.

   The image exists ONLY in the time-average. Every animation frame draws a
   handful of ink strokes sampled from each panel's DISTRIBUTION — one "ask".
   A retinal buffer accumulates them at low alpha — the vote. Panels whose
   distribution is a point mass fuse steady; the flap panel samples two
   near-identical figures at the measured 79/21 and fuses into a chromatic
   ghost that resolves, honestly, to a question; the walled panel cannot fuse
   at all until two registration hairlines click in (the day's two dark
   flags), after which it fuses late. No single frame knows the picture. */

const DUR = 26_000;               // one play
const A3_FLIP = 0.50;             // when the registration marks land
const B2_P = 0.79;                // the flap's measured rate
const PAPER = '#f6f1e7', GRAIN = 'rgba(120,105,80,0.05)';
const CARBON = '43,42,40', PRUSSIAN = '31,58,95', VERMILION = '181,58,32';

const cv = document.getElementById('c');
const W = 1180, H = 800, DPR = Math.min(2, window.devicePixelRatio || 1);
cv.width = W * DPR; cv.height = H * DPR;
cv.style.width = W + 'px'; cv.style.height = H + 'px';
const ctx = cv.getContext('2d'); ctx.scale(DPR, DPR);

// retina: the accumulation layer (the vote)
const ret = document.createElement('canvas');
ret.width = W * DPR; ret.height = H * DPR;
const rtx = ret.getContext('2d'); rtx.scale(DPR, DPR);

// ── paper ────────────────────────────────────────────────────────────────────
function paper(g) {
  g.fillStyle = PAPER; g.fillRect(0, 0, W, H);
  g.fillStyle = GRAIN;
  for (let i = 0; i < 2600; i++) {
    g.fillRect(Math.random() * W, Math.random() * H, 0.8, 0.8);
  }
}

// ── layout: 3×2 panels, bottom-weighted margins (the third-ink lesson) ──────
const MX = 64, MT = 84, MB = 116, GAP = 26;
const PW = (W - 2 * MX - 2 * GAP) / 3;
const PH = (H - MT - MB - GAP) / 2;
const panelXY = i => [MX + (i % 3) * (PW + GAP), MT + Math.floor(i / 3) * (PH + GAP)];

// ── figures: each returns one random stroke [x,y,angle,len] in unit space ───
const R = (a, b) => a + Math.random() * (b - a);
const jitter = a => a + R(-0.10, 0.10);

// six ascending bars — the real monthly report counts
const BARS = [248, 297, 351, 406, 465, 533].map(v => v / 533);
function figBars(alt) {
  const i = Math.floor(Math.random() * 6);
  let h = BARS[i];
  if (alt && i === 3) h *= 0.55;            // the wrong-year bar
  const x = 0.10 + i * 0.145 + R(0, 0.09);
  return [x, R(1 - h * 0.78 - 0.06, 0.94), jitter(Math.PI / 2), R(0.02, 0.055)];
}
// two discs + a small third — the pay mix
function figDiscs() {
  const which = Math.random();
  const [cx, cy, r] = which < 0.5 ? [0.32, 0.42, 0.20]
                    : which < 0.85 ? [0.68, 0.55, 0.145] : [0.56, 0.80, 0.065];
  const t = R(0, Math.PI * 2), rr = r * Math.sqrt(R(0.55, 1));
  return [cx + rr * Math.cos(t), cy + rr * Math.sin(t), jitter(t + Math.PI / 2), R(0.015, 0.04)];
}
// long top rule + five rows — the composed total ABOVE its breakdown
function figRows() {
  if (Math.random() < 0.30) return [R(0.08, 0.86), 0.16 + R(-0.008, 0.008), jitter(0), R(0.03, 0.07)];
  const i = Math.floor(Math.random() * 5);
  return [R(0.14, 0.72), 0.34 + i * 0.135 + R(-0.006, 0.006), jitter(0), R(0.02, 0.05)];
}
// rising doubling curve — H2 → H1
function figCurve() {
  const t = R(0, 1);
  const x = 0.08 + t * 0.84, y = 0.86 - 0.62 * (t * t * 0.85 + t * 0.15);
  const slope = Math.atan2(-(0.62 * (2 * t * 0.85 + 0.15)) * 0.84 / 1, 0.84);
  return [x, y, jitter(slope), R(0.02, 0.05)];
}
// three-part figure: dept block + wide carrier slab + six june ticks
function figAssembly() {
  const w = Math.random();
  if (w < 0.34) { // dept block, upper left
    return [R(0.10, 0.34), R(0.14, 0.40), jitter(Math.PI / 2), R(0.015, 0.04)];
  } else if (w < 0.70) { // carrier slab, wide + low
    return [R(0.10, 0.90), R(0.58, 0.70), jitter(0), R(0.02, 0.06)];
  }
  const i = Math.floor(Math.random() * 6); // june ticks
  return [0.16 + i * 0.13 + R(-0.01, 0.01), R(0.80, 0.90), jitter(Math.PI / 2), R(0.012, 0.03)];
}
const figNoise = () => [R(0.05, 0.95), R(0.05, 0.95), R(0, Math.PI * 2), R(0.01, 0.05)];

// ── panels: [sampler(t) -> {stroke, ink}] ────────────────────────────────────
const panels = [
  { name: 'i',   f: t => ({ s: figDiscs(),  ink: CARBON }) },
  { name: 'ii',  f: t => ({ s: figRows(),   ink: CARBON }) },
  { name: 'iii', f: t => (t < A3_FLIP ? { s: figNoise(), ink: CARBON, faint: true }
                                       : { s: figAssembly(), ink: PRUSSIAN, strong: true }) },
  { name: 'iv',  f: t => ({ s: figBars(false), ink: CARBON }) },
  { name: 'v',   f: t => (Math.random() < B2_P ? { s: figBars(false), ink: PRUSSIAN }
                                                : { s: figBars(true),  ink: VERMILION }) },
  { name: 'vi',  f: t => ({ s: figCurve(),  ink: CARBON }) },
];

function drawStroke(g, px, py, stroke, ink, alpha) {
  const [x, y, a, l] = stroke.s;
  const cx = px + x * PW, cy = py + y * PH, hl = l * PW / 2;
  g.strokeStyle = `rgba(${ink},${alpha})`;
  g.lineWidth = R(0.7, 1.5); g.lineCap = 'round';
  g.beginPath();
  g.moveTo(cx - Math.cos(a) * hl, cy - Math.sin(a) * hl);
  g.lineTo(cx + Math.cos(a) * hl, cy + Math.sin(a) * hl);
  g.stroke();
}

function frames(g) { // hairline panel rules
  g.strokeStyle = 'rgba(43,42,40,0.35)'; g.lineWidth = 0.6;
  for (let i = 0; i < 6; i++) { const [x, y] = panelXY(i); g.strokeRect(x, y, PW, PH); }
}

// registration marks for panel iii — two hairlines that click in at A3_FLIP
function registration(g, t) {
  const [x, y] = panelXY(2);
  const p = Math.min(1, Math.max(0, (t - A3_FLIP + 0.06) / 0.06));
  if (p <= 0) return;
  g.strokeStyle = `rgba(${VERMILION},${0.85 * p})`; g.lineWidth = 0.8;
  const inset = 12 + (1 - p) * 60;
  g.beginPath(); g.moveTo(x + inset, y + 8); g.lineTo(x + inset, y + 26); g.stroke();
  g.beginPath(); g.moveTo(x + PW - inset, y + PH - 26); g.lineTo(x + PW - inset, y + PH - 8); g.stroke();
  g.beginPath(); g.arc(x + inset, y + 17, 3.4, 0, Math.PI * 2); g.stroke();
  g.beginPath(); g.arc(x + PW - inset, y + PH - 17, 3.4, 0, Math.PI * 2); g.stroke();
}

// the honest resolution: a question mark over the ghost bar of panel v
function question(g) {
  const [x, y] = panelXY(4);
  const bx = x + (0.10 + 3 * 0.145 + 0.045) * PW, by = y + 0.30 * PH;
  g.strokeStyle = `rgba(${VERMILION},0.9)`; g.lineWidth = 2.1; g.lineCap = 'round';
  g.beginPath(); g.arc(bx, by, 9, Math.PI * 0.95, Math.PI * 2.25); g.stroke();
  g.beginPath(); g.moveTo(bx + 6.4, by + 6); g.quadraticCurveTo(bx + 2, by + 12, bx + 1, by + 18); g.stroke();
  g.beginPath(); g.arc(bx + 1, by + 26, 1.4, 0, Math.PI * 2); g.fill();
}

let start, done = false;
function play(ts) {
  if (start === undefined) { start = ts; paper(rtx); }
  const t = Math.min(1, (ts - start) / DUR);

  // the vote: accumulate this frame's asks into the retina
  for (let i = 0; i < 6; i++) {
    const [px, py] = panelXY(i);
    const n = panels[i].f(0).faint ? 10 : 14;
    for (let k = 0; k < (t < 1 ? n : 0); k++) {
      const smp = panels[i].f(t);
      drawStroke(rtx, px, py, smp, smp.ink, smp.faint ? 0.032 : smp.strong ? 0.115 : 0.075);
    }
  }

  // present: retina + this instant's raw flicker (the single ask, untrusted)
  ctx.drawImage(ret, 0, 0, W, H);
  if (t < 1) {
    for (let i = 0; i < 6; i++) {
      const [px, py] = panelXY(i);
      for (let k = 0; k < 3; k++) {
        const smp = panels[i].f(t);
        drawStroke(ctx, px, py, smp, smp.ink, 0.5);
      }
    }
  }
  frames(ctx); registration(ctx, t);

  if (t >= 1 && !done) {
    done = true;
    frames(rtx); registration(rtx, 1); question(rtx);
    ctx.drawImage(ret, 0, 0, W, H);
    return; // holds
  }
  if (!done) requestAnimationFrame(play);
}
requestAnimationFrame(play);
cv.addEventListener('click', () => {
  if (!done) return;
  start = undefined; done = false; requestAnimationFrame(play);
});
</script>
</body>
</html>
