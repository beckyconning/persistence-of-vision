<!doctype html>
<meta charset="utf-8">
<title>The Trace</title>
<style>
  html,body{margin:0;height:100%;background:#0c0b0f;display:grid;place-items:center;overflow:hidden}
  canvas{max-width:96vw;max-height:96vh}
</style>
<canvas id="c" width="860" height="1140"></canvas>
<script>
'use strict';
// THE TRACE — 2026-07-05
// The writers'-room run drawn from its own journal: 41 agents, 82 events, in
// TRUE append order. Each strand enters at its real `started` event and leaves
// at its real `result` event; every crossing exists because the run's log says
// two lifelines overlapped there. Nothing is composed — the braid IS the trace.
// (The Room's named debt: crossings from real event order. Paid.)

const cv = document.getElementById('c'), g = cv.getContext('2d');
const W = cv.width, H = cv.height, BG = '#0c0b0f';

// [startEvent, endEvent] per agent, in launch order — extracted verbatim from
// journal.jsonl of run wf_6e9a1549-453 (the Averline/Concur writers' room).
const SPANS = [[0,10],[1,7],[2,8],[3,9],[4,11],[5,6],[12,15],[13,17],[14,16],[18,19],[20,21],[22,31],[23,34],[24,30],[25,37],[26,35],[27,33],[28,36],[29,32],[38,51],[39,47],[40,52],[41,53],[42,54],[43,57],[44,49],[45,50],[46,55],[48,56],[58,62],[59,63],[60,61],[64,68],[65,69],[66,67],[70,71],[72,76],[73,78],[74,77],[75,79],[80,81]];
// launch-order → role color (run structure: 6 scouts, 3 judges, 1 synthesis,
// 1 buyer, 8 researchers, 10 verifiers, 3 writers, 3 examiners, 1 showrunner,
// 4 redteam, 1 fixer)
const ROLES = [
  ['scout', 6, '#57c9b0'], ['judge', 3, '#d4af57'], ['synthesis', 1, '#e8d9a0'],
  ['buyer', 1, '#8fb8e8'], ['researcher', 8, '#6f9fdd'], ['verifier', 10, '#d97f7f'],
  ['writer', 3, '#a98fd6'], ['examiner', 3, '#dd9f6f'], ['showrunner', 1, '#cbb8ec'],
  ['redteam', 4, '#e0846a'], ['fixer', 1, '#e8e3d5'],
];
const roleOf = [];
for (const [name, n, color] of ROLES) for (let i = 0; i < n; i++) roleOf.push({ name, color });

const T0 = 90, T1 = H - 70;                       // event 0..81 → y range
const yOf = e => T0 + (e / 81) * (T1 - T0);
const CX = W * 0.52;

// column layout per event index: active strands hold slots; a start takes the
// rightmost free slot; slots compact toward the spine as strands exit.
const slots = [];                                  // slots[i] = agent index or null
const posAt = [];                                  // posAt[event][agent] = slot
for (let e = 0; e <= 81; e++) {
  SPANS.forEach((s, a) => { if (s[1] === e) { const i = slots.indexOf(a); if (i >= 0) slots[i] = null; } });
  SPANS.forEach((s, a) => {
    if (s[0] === e) {
      let i = slots.indexOf(null);
      if (i < 0) { i = slots.length; slots.push(a); } else slots[i] = a;
    }
  });
  posAt[e] = slots.slice();
}
const maxSlots = Math.max(...posAt.map(p => p.length));
const slotX = i => CX - ((maxSlots - 1) / 2) * 34 + i * 34;

function xOf(agent, e) {
  const p = posAt[Math.max(0, Math.min(81, Math.round(e)))];
  const i = p.indexOf(agent);
  return i < 0 ? CX : slotX(i);
}

g.fillStyle = BG; g.fillRect(0, 0, W, H);

// faint event ruler
g.strokeStyle = 'rgba(150,158,166,.07)';
for (let e = 0; e <= 81; e += 2) { g.beginPath(); g.moveTo(60, yOf(e)); g.lineTo(W - 40, yOf(e)); g.stroke(); }

// paint strands in y-slabs; z-order per slab = launch order rotated by slab so
// crossings alternate deterministically with the run's own structure
for (let e = 0; e < 81; e += 0.5) {
  const y0 = yOf(e), y1 = yOf(e + 0.5);
  const active = SPANS.map((s, a) => ({ s, a })).filter(({ s }) => s[0] <= e + 0.5 && s[1] >= e);
  active.sort((p, q) => ((p.a + (e | 0)) % 7) - ((q.a + (e | 0)) % 7));
  for (const { s, a } of active) {
    const xa = xOf(a, Math.max(e, s[0])), xb = xOf(a, Math.min(e + 0.5, s[1]));
    g.beginPath(); g.moveTo(xa, Math.max(y0, yOf(s[0]))); g.lineTo(xb, Math.min(y1, yOf(s[1])));
    g.strokeStyle = BG; g.lineWidth = 6; g.stroke();
    g.strokeStyle = roleOf[a].color; g.lineWidth = 2.4; g.stroke();
  }
}
// entry ticks + exit drops to the spine
SPANS.forEach((s, a) => {
  const c = roleOf[a].color;
  g.fillStyle = c;
  g.beginPath(); g.arc(xOf(a, s[0]), yOf(s[0]), 3.4, 0, 7); g.fill();      // started
  const xe = xOf(a, s[1]);
  g.strokeStyle = c; g.lineWidth = 1.2; g.setLineDash([2, 3]);
  g.beginPath(); g.moveTo(xe, yOf(s[1])); g.lineTo(CX, yOf(s[1]) + 9); g.stroke(); // result → spine
  g.setLineDash([]);
});
// the spine: accumulated results
g.beginPath(); g.moveTo(CX, T0 - 20); g.lineTo(CX, T1 + 34);
g.strokeStyle = 'rgba(232,227,213,.16)'; g.lineWidth = 8; g.stroke();
g.beginPath(); g.moveTo(CX, T0 - 20); g.lineTo(CX, T1 + 34);
g.strokeStyle = 'rgba(232,227,213,.55)'; g.lineWidth = 1.6; g.stroke();

// labels
g.font = '15px ui-monospace,monospace'; g.fillStyle = 'rgba(220,225,230,.92)';
g.fillText('THE TRACE', 34, 40);
g.font = '11px ui-monospace,monospace'; g.fillStyle = 'rgba(150,158,166,.75)';
g.fillText('run wf_6e9a1549 · 41 agents · 82 journal events · drawn in true append order', 34, 58);
let ly = 84;
for (const [name, n, color] of ROLES) {
  g.fillStyle = color; g.fillRect(34, ly - 7, 8, 8);
  g.fillStyle = 'rgba(150,158,166,.8)'; g.fillText(`${name} ×${n}`, 48, ly); ly += 16;
}
g.fillStyle = 'rgba(232,227,213,.85)';
g.fillText('event 81: the episode returns', CX + 14, T1 + 20);
</script>
